<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training · Martin</title>
<meta name="theme-color" content="#EEF1F5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap">
<style>

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:oklch(97% 0.005 90); --card:oklch(99% 0.003 90); --card-muted:oklch(94% 0.006 90);
  --line:oklch(89% 0.007 90); --line2:oklch(93% 0.005 90);
  --ink:oklch(22% 0.01 90); --ink2:oklch(45% 0.01 90); --ink3:oklch(58% 0.01 90);
  --accent:oklch(45% 0.09 200); --accent-soft:oklch(93% 0.025 200); --accent-ink:oklch(38% 0.1 200); --accent-contrast:#fff;
  --danger:oklch(55% 0.19 25);
  --disp:'Space Grotesk', system-ui, sans-serif;
  --body:'Inter', system-ui, sans-serif;
  --mono:'JetBrains Mono', monospace;
  --shadow:0 1px 2px rgba(16,24,40,.04), 0 4px 14px rgba(16,24,40,.05);
}
@media (prefers-color-scheme: dark) {
:root {
  --bg:oklch(22% 0.015 260); --card:oklch(27% 0.015 260); --card-muted:oklch(19% 0.012 260);
  --line:oklch(34% 0.02 260); --line2:oklch(30% 0.018 260);
  --ink:oklch(96% 0.005 260); --ink2:oklch(75% 0.01 260); --ink3:oklch(58% 0.012 260);
  --accent:oklch(72% 0.16 55); --accent-soft:oklch(34% 0.05 55); --accent-ink:oklch(85% 0.11 55); --accent-contrast:oklch(18% 0.02 60);
  --danger:oklch(68% 0.18 25);
  --shadow:none;
}
}

html { -webkit-text-size-adjust:100%; }
body { background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.5; font-size:16px; min-height:100vh; }
.shell { max-width:760px; margin:0 auto; padding:22px 16px 64px; }

.view { display:none; }
.view.active { display:block; animation:fade .22s ease; }
@keyframes fade { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }

/* Top bar */
.topbar { display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
.week-select-wrap { margin-left:auto; position:relative; }
.week-select-label { display:block; font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); margin-bottom:5px; }
select#weekSelect { appearance:none; -webkit-appearance:none; background:var(--card); color:var(--ink); border:1.5px solid var(--line); border-radius:11px; font-family:var(--mono); font-size:13px; font-weight:600; padding:11px 38px 11px 14px; cursor:pointer; transition:border-color .15s; box-shadow:var(--shadow); min-height:44px; }
select#weekSelect:hover { border-color:var(--accent); }
.select-chevron { position:absolute; right:14px; bottom:15px; width:13px; height:13px; pointer-events:none; color:var(--ink3); }

/* Headers */
.page-header { margin-bottom:18px; }
.eyebrow { font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-ink); margin-bottom:6px; }
.page-header h1 { font-family:var(--disp); font-size:30px; font-weight:700; color:var(--ink); letter-spacing:-.02em; line-height:1.08; }
.page-header .sub { font-size:14px; color:var(--ink2); margin-top:7px; font-weight:500; }
.detail-sub { font-size:14px; color:var(--ink2); margin:12px 0 26px; line-height:1.55; }

/* Day cards */
.days { display:flex; flex-direction:column; gap:12px; }
.day-card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow); transition:transform .12s, box-shadow .12s, border-color .12s; }
.day-card.t-rest { background:var(--card-muted); }
.day-card.t-rest .dc-head { margin-bottom:0; }
.day-card.clickable { cursor:pointer; }
.day-card.clickable:hover { transform:translateY(-1px); border-color:var(--accent); }
.day-card.clickable:active { transform:translateY(0); }

.dc-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.dc-day { font-family:var(--disp); font-size:18px; font-weight:700; color:var(--ink); letter-spacing:-.01em; }
.dc-date { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--ink3); }

/* Tagestyp: Icon + Label statt Emoji-Badge/Farbbalken */
.type-badge { margin-left:auto; display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--ink2); white-space:nowrap; }
.type-icon { width:24px; height:24px; border-radius:8px; background:var(--card-muted); color:var(--ink3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.type-icon svg { width:14px; height:14px; }
.type-badge.focus { color:var(--accent-ink); }
.type-badge.focus .type-icon { background:var(--accent-soft); color:var(--accent-ink); }

.dc-einheit { font-size:16px; font-weight:600; color:var(--ink); }
.dc-sub { font-size:13px; color:var(--ink2); margin-top:3px; font-weight:500; display:flex; flex-direction:column; gap:2px; }
.dc-rx { margin-top:11px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.dc-rx-main { font-family:var(--mono); font-size:15px; font-weight:600; color:var(--ink); line-height:1.45; }
.dc-rx-main .rv { color:var(--accent-ink); font-weight:700; }
.rpe-pill { display:inline-block; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--mono); font-size:12px; font-weight:700; padding:3px 9px; border-radius:7px; white-space:nowrap; }
.dc-note { font-size:13px; color:var(--ink2); margin-top:11px; line-height:1.5; }
.dc-open { display:inline-flex; align-items:center; gap:6px; margin-top:13px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--accent-ink); }
.dc-open svg { width:14px; height:14px; }

/* Strava stats */
.dc-strava { margin-top:13px; padding-top:12px; border-top:1px solid var(--line2); }
.strava-logo { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); background:var(--card-muted); padding:3px 8px; border-radius:6px; display:inline-block; margin-bottom:10px; }
.dc-strava-grid { display:flex; flex-wrap:wrap; gap:8px; }
.rs-chip { background:var(--card-muted); border:1px solid var(--line2); border-radius:10px; padding:8px 12px; flex:1 1 calc(25% - 6px); min-width:70px; }
.rs-label { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink3); margin-bottom:3px; }
.rs-val { font-family:var(--mono); font-size:18px; font-weight:700; color:var(--ink); line-height:1.1; }
.rs-unit { font-size:11px; font-weight:500; color:var(--ink3); }

/* Notes system */
.note-bar { display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid var(--line2); }
.note-toggle-btn { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3); background:none; border:none; cursor:pointer; padding:0; transition:color .15s; }
.note-toggle-btn:hover { color:var(--accent-ink); }
.note-has-indicator { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink2); }
.note-feel-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
.note-has-indicator.draft { color:var(--ink3); }
.note-has-indicator.draft .note-feel-dot { background:var(--ink3); }

.note-panel { display:none; margin-top:12px; background:var(--card-muted); border:1px solid var(--line2); border-radius:12px; padding:14px; }
.note-panel.open { display:block; animation:fade .18s ease; }

.feel-label { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink3); margin-bottom:8px; }
.feel-row { display:flex; gap:8px; margin-bottom:12px; }
.feel-btn { flex:1; min-height:44px; border:1.5px solid var(--line); border-radius:10px; background:var(--card); font-family:var(--mono); font-size:15px; font-weight:700; color:var(--ink2); cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.feel-btn:hover { border-color:var(--accent); color:var(--accent-ink); }
.feel-btn.selected { border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink); }

.note-textarea { width:100%; min-height:150px; border:1.5px solid var(--line); border-radius:10px; padding:11px 13px; font-family:var(--body); font-size:14px; color:var(--ink); background:var(--card); resize:vertical; outline:none; transition:border-color .15s; line-height:1.5; }

abbr[data-full] { text-decoration:underline dotted var(--ink3); cursor:pointer; }
abbr[data-full].expanded { text-decoration:none; color:var(--accent-ink); }

.day-card.collapsed .dc-body { display:none; }
.day-card.collapsed { cursor:pointer; opacity:.72; }
.day-card.collapsed:hover { opacity:1; transform:translateY(-1px); }
.day-card.collapsed .dc-head { margin-bottom:0; }

.show-all-btn { display:block; width:100%; margin-top:4px; padding:12px; background:var(--card); border:1.5px dashed var(--line); border-radius:14px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3); cursor:pointer; transition:all .15s; }
.show-all-btn:hover { border-color:var(--accent); color:var(--accent-ink); }
.note-textarea:focus { border-color:var(--accent); }
.note-textarea::placeholder { color:var(--ink3); }

.note-actions { display:flex; align-items:center; gap:12px; margin-top:10px; }
.note-save-btn { min-height:40px; padding:0 18px; background:var(--accent); color:var(--accent-contrast); border:none; border-radius:9px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:opacity .15s; }
.note-save-btn:hover { opacity:.85; }
.note-save-btn:disabled { background:var(--ink3); cursor:not-allowed; }
.note-status { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--ink2); }
.note-status.err { color:var(--danger); }

/* Detail nav */
.nav-back { display:inline-flex; align-items:center; gap:7px; cursor:pointer; color:var(--ink2); font-family:var(--mono); font-size:12px; font-weight:600; padding:11px 15px; background:var(--card); border:1.5px solid var(--line); border-radius:11px; margin-bottom:20px; transition:all .14s; min-height:44px; box-shadow:var(--shadow); }
.nav-back:hover { color:var(--accent-ink); border-color:var(--accent); }
.nav-back svg { width:14px; height:14px; }
.crumb { font-family:var(--mono); font-size:12px; color:var(--ink3); margin-bottom:18px; font-weight:600; }
.crumb .lnk { color:var(--accent-ink); cursor:pointer; }
.crumb .sep { margin:0 7px; color:var(--line); }

/* Focus blocks */
.blk { margin-bottom:26px; }
.blk-head { display:flex; align-items:center; gap:11px; margin-bottom:12px; }
.blk-letter { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--accent-contrast); background:var(--accent); width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.blk-title { font-family:var(--disp); font-size:16px; font-weight:700; color:var(--ink); letter-spacing:-.01em; }
.blk-sub { font-family:var(--mono); font-size:11px; font-weight:500; color:var(--ink3); margin-top:1px; }
.exc { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:15px 16px; box-shadow:var(--shadow); margin-bottom:10px; }
.exc-name { font-family:var(--disp); font-size:18px; font-weight:700; color:var(--ink); letter-spacing:-.01em; line-height:1.2; }
.exc-name small { display:block; font-family:var(--body); font-size:13px; font-weight:500; color:var(--ink3); margin-top:2px; }
.exc-data { display:flex; flex-wrap:wrap; gap:8px; margin-top:13px; }
.chip { background:var(--card-muted); border:1px solid var(--line2); border-radius:10px; padding:8px 12px; min-width:74px; }
.chip-label { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink3); margin-bottom:3px; }
.chip-val { font-family:var(--mono); font-size:17px; font-weight:700; color:var(--ink); line-height:1.15; }
.chip-val small { display:block; font-size:11px; font-weight:500; color:var(--ink3); margin-top:2px; letter-spacing:0; }
.chip.rpe { background:var(--accent-soft); border-color:var(--accent-soft); }
.chip.rpe .chip-label { color:var(--accent-ink); }
.chip.rpe .chip-val { color:var(--accent-ink); }
.exc-meta { display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; font-family:var(--mono); font-size:12px; font-weight:500; color:var(--ink2); }
.exc-meta b { color:var(--ink3); font-weight:600; font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-right:5px; }
.exc-note { font-size:13px; color:var(--ink2); margin-top:12px; line-height:1.55; padding-top:11px; border-top:1px solid var(--line2); }
.blk-note { margin-top:11px; padding:12px 14px; background:var(--accent-soft); border-radius:12px; font-size:13px; color:var(--accent-ink); line-height:1.55; font-weight:500; }
/* WOD-Block: Struktur, Reps, Lasten und Zeitlimit zusammen sichtbar, gleiche Schriftgröße für Reps/Move/Detail — keine Prioritäts-Hierarchie */
.wod { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:var(--shadow); }
.wod-struct { font-family:var(--disp); font-size:21px; font-weight:700; color:var(--ink); letter-spacing:-.015em; line-height:1.2; }
.wod-tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; }
.wod-tag { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:5px 10px; border-radius:8px; background:var(--card-muted); color:var(--ink2); }
.wod-tag.cap { background:var(--accent-soft); color:var(--accent-ink); }
.wod-lines { margin-top:15px; border-top:1px solid var(--line2); }
.wod-line { display:flex; align-items:baseline; gap:13px; padding:12px 0; border-bottom:1px solid var(--line2); }
.wod-line:last-child { border-bottom:none; padding-bottom:2px; }
.wod-reps { font-family:var(--mono); font-size:15px; font-weight:700; color:var(--ink); min-width:40px; flex-shrink:0; line-height:1.3; }
.wod-move { font-family:var(--disp); font-size:15px; font-weight:600; color:var(--ink); flex:1; line-height:1.3; }
.wod-detail { font-family:var(--mono); font-size:15px; font-weight:600; color:var(--ink2); text-align:right; flex-shrink:0; white-space:nowrap; }
.wod-total { margin-top:13px; padding-top:12px; border-top:1px solid var(--line2); font-family:var(--mono); font-size:12px; font-weight:500; color:var(--ink3); line-height:1.5; }
@media (max-width:420px){
  .wod-line { flex-wrap:wrap; gap:0 13px; }
  .wod-detail { width:100%; text-align:left; margin-top:3px; padding-left:53px; }
}

/* WHOOP: kopierbarer Textblock statt Karte mit Listen-Items */
.whoop-copy { margin-top:30px; background:var(--card-muted); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
.whoop-copy-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.whoop-copy-title { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); }
.copy-btn { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink2); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:6px 10px; cursor:pointer; }
.copy-btn:hover { border-color:var(--accent); color:var(--accent-ink); }
.copy-btn svg { width:13px; height:13px; }
.whoop-text { font-family:var(--mono); font-size:13px; color:var(--ink); line-height:1.75; white-space:pre-wrap; }

.empty { padding:48px; text-align:center; color:var(--ink3); }

@media (max-width:480px){
  .shell { padding:18px 13px 56px; }
  .page-header h1 { font-size:26px; }
  .chip { flex:1 1 calc(50% - 4px); min-width:0; }
  .rs-chip { flex:1 1 calc(50% - 4px); min-width:0; }
  .note-textarea { min-height:160px; }
}
</style>
</head>
<body>
<div class="shell">

  <div id="view-week" class="view active">
    <div class="topbar">
      <div class="week-select-wrap">
        <span class="week-select-label">Woche wählen</span>
        <select id="weekSelect" onchange="onWeekChange()"></select>
        <svg class="select-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
      </div>
    </div>
    <div id="weekContent"></div>
  </div>

  <div id="view-focus" class="view">
    <div class="nav-back" onclick="showWeek()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      Zurück zum Wochenplan
    </div>
    <div id="focusContent"></div>
  </div>

</div>

<script src="data.js"></script>
<script>
/* Abbreviations */
const ABBR = {
  'HSPU':'Handstand Push-Up','BMU':'Bar Muscle-Up','MU':'Muscle-Up',
  'T2B':'Toes-to-Bar','K2E':'Knees-to-Elbow','C&J':'Clean & Jerk',
  'OHS':'Overhead Squat','FS':'Front Squat','BS':'Back Squat',
  'PC':'Power Clean','PS':'Power Snatch','SN':'Snatch',
  'DL':'Deadlift','RDL':'Romanian Deadlift','KB':'Kettlebell',
  'DB':'Dumbbell','BB':'Barbell','BW':'Bodyweight',
  'EMOM':'Every Minute on the Minute','AMRAP':'As Many Rounds as Possible',
  'RFT':'Rounds for Time','NFT':'Not for Time','GHD':'Glute-Ham Developer',
  'RM':'Repetition Maximum','RPE':'Rate of Perceived Exertion',
  'Z1':'Zone 1','Z2':'Zone 2','Z3':'Zone 3','HR':'Heart Rate',
  'CAR':'Controlled Articular Rotation','BWS':'Brustwirbelsäule',
  'PP':'Push Press','PJ':'Push Jerk','SJ':'Split Jerk'
};
function expandAbbr(text){
  return text.replace(/\b([A-Z][A-Z0-9&]+)\b/g, (m) =>
    ABBR[m] ? `<abbr title="${ABBR[m]}" data-abbr="${m}" data-full="${ABBR[m]}">${m}</abbr>` : m
  );
}
document.addEventListener('click', e => {
  const a = e.target.closest('abbr[data-full]');
  if (!a) return;
  e.stopPropagation();
  const expanded = a.classList.toggle('expanded');
  a.textContent = expanded ? a.dataset.full : a.dataset.abbr;
});

/* State */
let currentWeekId = null;
let weekNotes = {};
let selectedFeel = {};

/* Icons — geometrisches Icon-System statt Emoji */
const ICON = {
  box:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="12" r="4.2"/><circle cx="17.5" cy="12" r="4.2"/><rect x="10.6" y="10.1" width="2.8" height="2.8" transform="rotate(45 12 11.5)"/></svg>',
  own:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="2.4" rx="1"/><rect x="3" y="8" width="3.4" height="8" rx="1"/><rect x="17.6" y="8" width="3.4" height="8" rx="1"/></svg>',
  rest: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  ride: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-6 3 11 2-7 2 2h5"/></svg>'
};
const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M5 15V6a2 2 0 0 1 2-2h9"/></svg>';

/* Session-Feel: wie die Einheit lief, 1 = mies bis 5 = stark. Nummerierte
   Pills statt Emoji — Bedeutung/Skala unverändert, nur die Darstellung. */
const FEEL_LABEL = ['','Mies','Zäh','Okay','Gut','Stark'];

/* Type config */
const TYPE = {
  rest: { cls:'t-rest', icon:'rest', label:'Recovery' },
  box:  { cls:'',       icon:'box',  label:'Class' },
  own:  { cls:'',       icon:'own',  label:null },
  ride: { cls:'',       icon:'ride', label:'Cardio' }
};

/* Helpers */
function splitMain(val){
  const p = String(val).split('||');
  return p.length===1 ? p[0] : `${p[0]}<small>${p.slice(1).join(' ')}</small>`;
}
function renderSub(sub){
  if (!sub) return '';
  const blocks = sub.includes('→') ? sub.split('→') : sub.split('·');
  return `<div class="dc-sub">${blocks.map(b=>`<div>${b.trim()}</div>`).join('')}</div>`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
/* f.intro ist vertrautes HTML fürs Rendering (<em>, &amp; als Entity) — für
   den WHOOP-Klartextblock erst zu reinem Text auflösen, sonst landen rohe
   Tags/Entities im Copy-Text und auf dem Bildschirm. */
function stripHtml(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || '';
}
function field(headers, row, matchers){
  for(let i=0;i<headers.length;i++) if(matchers.some(m=>headers[i].toLowerCase().includes(m))) return row[i];
  return null;
}
function getWeek(id){ return DATA.weeks.find(w=>w.id===id); }
function todayLocal(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function currentWeek(){
  const t = todayLocal();
  return DATA.weeks.find(w => w.dateFrom <= t && t <= w.dateTo) || DATA.weeks[0];
}

/* Notiz-Drafts (localStorage) */
function draftKey(d){ return 'note-draft-' + d; }
function loadDraft(d){
  try {
    const raw = JSON.parse(localStorage.getItem(draftKey(d)));
    if (!raw) return null;
    return { feel: raw.feel ?? raw.rpe ?? 0, text: raw.text || '' };
  } catch(e){ return null; }
}
function saveDraft(d){
  const text = document.getElementById('ntext-' + d)?.value || '';
  const feel = selectedFeel[d] || 0;
  try {
    if (text || feel) localStorage.setItem(draftKey(d), JSON.stringify({ feel, text }));
    else localStorage.removeItem(draftKey(d));
  } catch(e){}
  patchNoteIndicator(d);
}
function clearDraft(d){
  try { localStorage.removeItem(draftKey(d)); } catch(e){}
}
function restoreDraft(d){
  const draft = loadDraft(d);
  if (!draft) return;
  const ta = document.getElementById('ntext-' + d);
  if (ta && draft.text) ta.value = draft.text;
  if (draft.feel > 0) {
    selectedFeel[d] = draft.feel;
    document.querySelectorAll(`[data-feel-date="${d}"]`).forEach(btn =>
      btn.classList.toggle('selected', parseInt(btn.dataset.feelVal) === draft.feel));
  }
  patchNoteIndicator(d);
}

/* Notes API */
async function loadNotes(fromDate, toDate){
  try {
    const r = await fetch(`/get_notes.php?from=${fromDate}&to=${toDate}`);
    if (!r.ok) return;
    const d = await r.json();
    weekNotes = {};
    (d.notes || []).forEach(n => {
      weekNotes[n.note_date] = {
        session_feel: parseInt(n.session_feel ?? n.rpe_feel) || 0,
        note_text: n.note_text
      };
    });
    patchAllNoteUIs();
  } catch(e) { console.warn('Notes load failed', e); }
}

async function saveNote(isoDate){
  const btn  = document.getElementById('nsave-' + isoDate);
  const stat = document.getElementById('nstat-' + isoDate);
  const text = document.getElementById('ntext-' + isoDate)?.value || '';
  const feel = selectedFeel[isoDate] || 0;

  btn.disabled = true;
  btn.textContent = '…';

  try {
    const r = await fetch('/save_note.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_key: isoDate, note_date: isoDate, session_feel: feel, note_text: text })
    });
    if (r.ok) {
      weekNotes[isoDate] = { session_feel: feel, note_text: text };
      clearDraft(isoDate);
      stat.textContent = 'Gespeichert';
      stat.className = 'note-status';
      patchNoteIndicator(isoDate);
    } else {
      stat.textContent = 'Fehler — Entwurf bleibt lokal';
      stat.className = 'note-status err';
    }
  } catch(e) {
    stat.textContent = 'Offline — Entwurf bleibt lokal';
    stat.className = 'note-status err';
  }

  btn.disabled = false;
  btn.textContent = 'Speichern';
  setTimeout(() => { if(stat) stat.textContent = ''; }, 3000);
}

/* Note UI patches */
function patchAllNoteUIs(){
  Object.entries(weekNotes).forEach(([date, note]) => patchNoteUI(date, note));
}

function patchNoteUI(date, note){
  const draft = loadDraft(date);
  const ta = document.getElementById('ntext-' + date);
  if (ta && note.note_text && !(draft && draft.text)) ta.value = note.note_text;
  if (note.session_feel > 0 && !(draft && draft.feel > 0)) {
    selectedFeel[date] = note.session_feel;
    document.querySelectorAll(`[data-feel-date="${date}"]`).forEach(btn => {
      btn.classList.toggle('selected', parseInt(btn.dataset.feelVal) === note.session_feel);
    });
  }
  patchNoteIndicator(date);
}

function patchNoteIndicator(date){
  const ind = document.getElementById('nind-' + date);
  if (!ind) return;
  const note = weekNotes[date];
  const draft = loadDraft(date);
  const draftDiffers = draft &&
    (draft.text !== ((note && note.note_text) || '') || draft.feel !== ((note && note.session_feel) || 0));
  if (draftDiffers) {
    ind.innerHTML = `<span class="note-has-indicator draft"><span class="note-feel-dot"></span>Entwurf</span>`;
  } else if (note && (note.session_feel > 0 || note.note_text)) {
    const feel = note.session_feel > 0 ? `${note.session_feel} · ` : '';
    ind.innerHTML = `<span class="note-has-indicator"><span class="note-feel-dot"></span>${feel}Notiz gespeichert</span>`;
  } else {
    ind.innerHTML = '';
  }
}

/* Toggle note panel */
function toggleNote(isoDate, event){
  if (event) event.stopPropagation();
  const panel = document.getElementById('np-' + isoDate);
  if (!panel) return;
  panel.classList.toggle('open');
}

function selectFeel(isoDate, val, event){
  if (event) event.stopPropagation();
  selectedFeel[isoDate] = val;
  document.querySelectorAll(`[data-feel-date="${isoDate}"]`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.feelVal) === val);
  });
  saveDraft(isoDate);
}

/* Build note block HTML — nummerierte Pills statt Emoji */
function buildNoteHTML(isoDate, type){
  if (type === 'rest') return '';
  const feelButtons = [1,2,3,4,5].map(i =>
    `<button class="feel-btn" data-feel-date="${isoDate}" data-feel-val="${i}"
             title="${i} — ${FEEL_LABEL[i]}" aria-label="${FEEL_LABEL[i]}"
             onclick="selectFeel('${isoDate}', ${i}, event)">${i}</button>`
  ).join('');
  return `
    <div class="note-bar" onclick="event.stopPropagation()">
      <button class="note-toggle-btn" onclick="toggleNote('${isoDate}', event)">Notiz</button>
      <div id="nind-${isoDate}"></div>
    </div>
    <div class="note-panel" id="np-${isoDate}" onclick="event.stopPropagation()">
      <div class="feel-label">Wie lief die Session?</div>
      <div class="feel-row">${feelButtons}</div>
      <textarea class="note-textarea" id="ntext-${isoDate}" oninput="saveDraft('${isoDate}')"
                placeholder="Was lief gut / schlecht? Lasten, Energie, Technik…"></textarea>
      <div class="note-actions">
        <button class="note-save-btn" id="nsave-${isoDate}"
                onclick="saveNote('${isoDate}')">Speichern</button>
        <span class="note-status" id="nstat-${isoDate}"></span>
      </div>
    </div>`;
}

/* Render week */
function initSelect(){
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = DATA.weeks.map(w=>`<option value="${w.id}">${w.label}</option>`).join('');
  currentWeekId = currentWeek().id;
  sel.value = currentWeekId;
}

function onWeekChange(){ navigate(document.getElementById('weekSelect').value); }

function renderStravaStats(s){
  return `<div class="dc-strava"><div class="strava-logo">Strava</div>
    <div class="dc-strava-grid">
      <div class="rs-chip"><div class="rs-label">Distanz</div><div class="rs-val">${s.km}<span class="rs-unit"> km</span></div></div>
      <div class="rs-chip"><div class="rs-label">Zeit</div><div class="rs-val">${s.time}</div></div>
      <div class="rs-chip"><div class="rs-label">Elevation</div><div class="rs-val">${s.elev}<span class="rs-unit"> m</span></div></div>
      <div class="rs-chip"><div class="rs-label">Ø Speed</div><div class="rs-val">${s.speed}<span class="rs-unit"> km/h</span></div></div>
    </div></div>`;
}

function renderWeek(){
  const w = getWeek(currentWeekId);
  if(!w){ document.getElementById('weekContent').innerHTML='<div class="empty">Keine Daten.</div>'; return; }

  selectedFeel = {};

  const cards = w.days.map(d => {
    const t = TYPE[d.type];
    const label = d.type==='own' ? `Focus ${d.focus}` : t.label;
    const clickable = d.type==='own';
    const badge = `<span class="type-badge${d.type==='own'?' focus':''}"><span class="type-icon">${ICON[t.icon]}</span>${label}</span>`;

    let body = '';
    if (d.type !== 'rest') {
      const einheit = `<div class="dc-einheit">${d.einheit}</div>${renderSub(d.sub)}`;
      const rx = d.rx==='—' ? '' :
        `<div class="dc-rx"><span class="dc-rx-main">${d.rx}</span>${d.rpe?`<span class="rpe-pill">${d.rpe}</span>`:''}</div>`;
      const strava = (d.type==='ride'&&d.strava) ? renderStravaStats(d.strava) : '';
      const open   = clickable ? `<div class="dc-open" onclick="openFocus('${d.focus}', event)">Routine öffnen <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 3l5 5-5 5"/></svg></div>` : '';
      const notes  = buildNoteHTML(d.isoDate, d.type);
      const note   = d.note ? `<div class="dc-note">${d.note}</div>` : '';
      body = `<div class="dc-body">${einheit}${rx}${note}${strava}${open}${notes}</div>`;
    }

    return `<div class="day-card ${t.cls}" id="dc-${d.isoDate}" onclick="toggleDay('${d.isoDate}','${d.focus||''}')"><div class="dc-head"><span class="dc-day">${d.day}</span><span class="dc-date">${d.date}</span>${badge}</div>${body}</div>`;
  }).join('');

  document.getElementById('weekContent').innerHTML = `
    <div class="page-header"><div class="eyebrow">${w.meso}</div><h1>Wochenplan</h1>
    <div class="sub">${w.label.split('·').slice(1).join('·').trim()} &nbsp;·&nbsp; ${w.phase} &nbsp;·&nbsp; ${w.id}</div></div>
    <button class="show-all-btn" id="toggle-days-top" onclick="collapseToToday()" style="display:none;margin-bottom:12px">Nur heute anzeigen</button>
    <div class="days">${cards}</div>
    <button class="show-all-btn" id="toggle-days-btn" onclick="toggleAllDays()">Alle Tage anzeigen</button>`;

  w.days.forEach(d => restoreDraft(d.isoDate));
  if (w.dateFrom && w.dateTo) loadNotes(w.dateFrom, w.dateTo);

  const today = todayLocal();
  requestAnimationFrame(() => {
    w.days.forEach(d => {
      const card = document.getElementById('dc-' + d.isoDate);
      if (!card) return;
      if (d.isoDate === today && w.dateFrom <= today && today <= w.dateTo) {
        card.scrollIntoView({ behavior:'smooth', block:'start' });
      } else {
        card.classList.add('collapsed');
      }
    });
  });
}

function toggleDay(isoDate, focusKey) {
  const card = document.getElementById('dc-' + isoDate);
  if (!card) return;
  if (card.classList.contains('collapsed')) {
    card.classList.remove('collapsed');
  } else {
    card.classList.add('collapsed');
  }
}

function openFocus(focusKey, event) {
  event.stopPropagation();
  showFocus(focusKey);
}

function toggleAllDays() {
  const collapsed = document.querySelectorAll('.day-card.collapsed');
  if (collapsed.length > 0) {
    collapsed.forEach(c => c.classList.remove('collapsed'));
    document.getElementById('toggle-days-btn').textContent = 'Nur heute anzeigen';
    document.getElementById('toggle-days-top').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    collapseToToday();
  }
}

function collapseToToday() {
  const today = todayLocal();
  document.querySelectorAll('.day-card').forEach(c => {
    if (c.id !== 'dc-' + today) c.classList.add('collapsed');
  });
  document.getElementById('toggle-days-btn').textContent = 'Alle Tage anzeigen';
  document.getElementById('toggle-days-top').style.display = 'none';
  const todayCard = document.getElementById('dc-' + today);
  if (todayCard) todayCard.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* Focus day */
function renderExercise(headers,row){
  const name=field(headers,row,['übung']), sets=field(headers,row,['sets','sätze']), dauer=field(headers,row,['dauer']);
  const last=field(headers,row,['last']), rpe=field(headers,row,['rpe']), tempo=field(headers,row,['tempo']);
  const rest=field(headers,row,['rest','pause']), note=field(headers,row,['note']);
  let chips='';
  if(sets)  chips+=`<div class="chip"><div class="chip-label">Sätze × Wdh</div><div class="chip-val">${splitMain(sets)}</div></div>`;
  if(dauer) chips+=`<div class="chip"><div class="chip-label">Dauer</div><div class="chip-val">${splitMain(dauer)}</div></div>`;
  if(last)  chips+=`<div class="chip"><div class="chip-label">Last</div><div class="chip-val">${splitMain(last)}</div></div>`;
  if(rpe)   chips+=`<div class="chip rpe"><div class="chip-label">RPE</div><div class="chip-val">${rpe}</div></div>`;
  const meta=[];
  if(tempo) meta.push(`<span><b>Tempo</b>${tempo}</span>`);
  if(rest)  meta.push(`<span><b>Pause</b>${rest}</span>`);
  return `<div class="exc"><div class="exc-name">${expandAbbr(splitMain(name))}</div>${chips?`<div class="exc-data">${chips}</div>`:''}${meta.length?`<div class="exc-meta">${meta.join('')}</div>`:''}${note?`<div class="exc-note">${expandAbbr(note)}</div>`:''}</div>`;
}

function renderWod(w){
  const tags = [
    w.format ? `<span class="wod-tag">${w.format}</span>` : '',
    w.cap    ? `<span class="wod-tag cap">${w.cap}</span>` : ''
  ].join('');
  const lines = w.bewegungen.map(m =>
    `<div class="wod-line"><div class="wod-reps">${m.reps}</div><div class="wod-move">${expandAbbr(m.name)}</div>${m.detail?`<div class="wod-detail">${m.detail}</div>`:''}</div>`
  ).join('');
  return `<div class="wod">
    <div class="wod-struct">${w.struktur}</div>
    ${tags?`<div class="wod-tags">${tags}</div>`:''}
    <div class="wod-lines">${lines}</div>
    ${w.gesamt?`<div class="wod-total">Gesamt: ${expandAbbr(w.gesamt)}</div>`:''}
  </div>`;
}

function renderBlock(b){
  const body = b.wod ? renderWod(b.wod) : (b.rows||[]).map(r=>renderExercise(b.headers,r)).join('');
  return `<div class="blk"><div class="blk-head"><div class="blk-letter">${b.letter}</div><div><div class="blk-title">${b.title}</div><div class="blk-sub">${b.sub}</div></div></div>${body}${b.note?`<div class="blk-note">${b.note}</div>`:''}</div>`;
}

/* WHOOP: kopierbarer Textblock statt Liste */
function renderWhoopCopy(f){
  const lines = f.whoop.map(([n,d]) => `${stripHtml(n)}: ${stripHtml(d)}`).join('\n');
  const introPlain = f.intro ? stripHtml(f.intro) : '';
  const text = `${stripHtml(f.title)}\n${stripHtml(f.date)}\n\n${lines}${introPlain ? `\n\n${introPlain}` : ''}`;
  return `<div class="whoop-copy" data-whoop-text="${encodeURIComponent(text)}">
    <div class="whoop-copy-head"><span class="whoop-copy-title">Für WHOOP kopieren</span>
      <button class="copy-btn" onclick="copyWhoopText(this)">${COPY_ICON}Kopieren</button></div>
    <div class="whoop-text">${escapeHtml(text)}</div></div>`;
}

function copyWhoopText(btn){
  const box = btn.closest('.whoop-copy');
  const text = decodeURIComponent(box.dataset.whoopText);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Kopiert!';
    setTimeout(() => { btn.innerHTML = `${COPY_ICON}Kopieren`; }, 1500);
  });
}

function renderFocus(key){
  const w=getWeek(currentWeekId), f=w.focusDays[key];
  if(!f){ document.getElementById('focusContent').innerHTML='<div class="empty">Kein Focus-Tag.</div>'; return; }
  document.getElementById('focusContent').innerHTML=`
    <div class="crumb"><span class="lnk" onclick="showWeek()">${w.label}</span><span class="sep">/</span>Focus-Tag ${key}</div>
    <div class="page-header"><div class="eyebrow">${f.date}</div><h1>${f.title}</h1><div class="sub">${f.sub}</div></div>
    <p class="detail-sub">${f.intro}</p>
    ${f.blocks.map(renderBlock).join('')}
    ${renderWhoopCopy(f)}
    <div class="nav-back" onclick="showWeek()" style="margin-top:28px">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      Zurück zum Wochenplan
    </div>`;
}

/* Navigation (Hash-Routing) */
let renderedWeekId = null;

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function navigate(wid, fkey){
  const target = fkey ? `${wid}/${fkey}` : wid;
  if (location.hash.slice(1) === target) applyRoute();
  else location.hash = target;
}

function showWeek(){ navigate(currentWeekId); }
function showFocus(key){ navigate(currentWeekId, key); }

function applyRoute(){
  const [wid, fkey] = location.hash.slice(1).split('/');
  if (wid && getWeek(wid)) {
    currentWeekId = wid;
  } else {
    currentWeekId = currentWeek().id;
    history.replaceState(null, '', '#' + currentWeekId);
  }
  document.getElementById('weekSelect').value = currentWeekId;
  if (renderedWeekId !== currentWeekId) {
    renderWeek();
    renderedWeekId = currentWeekId;
  }
  const w = getWeek(currentWeekId);
  if (fkey && w.focusDays && w.focusDays[fkey]) {
    renderFocus(fkey);
    switchView('view-focus');
  } else {
    switchView('view-week');
  }
}

window.addEventListener('hashchange', applyRoute);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

initSelect();
if (location.hash.slice(1).split('/')[0] !== currentWeekId) {
  history.replaceState(null, '', '#' + currentWeekId);
}
applyRoute();
</script>
